version: "3.8"

# k6 Load Testing Stack
# Usage:
#   docker compose -f docker-compose.k6.yml up -d influxdb grafana
#   docker compose -f docker-compose.k6.yml run --rm k6 run /scripts/health-check.js

services:
  k6:
    image: grafana/k6:latest
    container_name: k6-runner
    volumes:
      - ./scripts:/scripts:ro
      - ./config:/config:ro
      - ./results:/results
    environment:
      - K6_OUT=influxdb=http://influxdb:8086/k6
      - BASE_URL=http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - k6-network
      - microservices-network
    depends_on:
      influxdb:
        condition: service_healthy

  influxdb:
    image: influxdb:1.8
    container_name: k6-influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_MAX_BODY_SIZE=0
    volumes:
      - k6-influxdb-data:/var/lib/influxdb
    healthcheck:
      test: ["CMD", "influx", "-execute", "SHOW DATABASES"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - k6-network

  grafana:
    image: grafana/grafana:latest
    container_name: k6-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - k6-grafana-data:/var/lib/grafana
    networks:
      - k6-network
    depends_on:
      influxdb:
        condition: service_healthy

volumes:
  k6-influxdb-data:
  k6-grafana-data:

networks:
  k6-network:
    driver: bridge
  microservices-network:
    external: true
