{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "microservices-platform.fullname" . }}-redis
  namespace: {{ include "microservices-platform.namespace" . }}
  labels:
    {{- include "microservices-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: tcp
      protocol: TCP
      name: tcp
  selector:
    {{- include "microservices-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: cache
{{- end }}
