server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: ""
    batchwait: 1s
    batchsize: 1048576  # 1MB

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: ["running"]
    relabel_configs:
      # Extract container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      # Extract compose service name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      # Extract compose project name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
      # Set log stream label
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
    pipeline_stages:
      # Try to parse JSON logs (FastAPI structured logging)
      - json:
          expressions:
            level: level
            correlation_id: correlation_id
            message: message
            logger: logger
            timestamp: timestamp
            method: method
            path: path
            status_code: status_code
            duration_ms: duration_ms
      # Map extracted level to label
      - labels:
          level:
          correlation_id:
          logger:
      # Set output to message field if available
      - output:
          source: message
      # Fallback: if JSON parsing fails, use regex for common log patterns
      - regex:
          expression: '(?P<level>DEBUG|INFO|WARNING|ERROR|CRITICAL)\s+(?P<message>.*)'
      - labels:
          level:
