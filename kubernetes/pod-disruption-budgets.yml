apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-api-pdb
  namespace: microservices-cicd-platform
  labels:
    app: backend-api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend-api
