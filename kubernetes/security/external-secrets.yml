# US-42: External Secrets Operator (alternative to Sealed Secrets)
#
# External Secrets Operator syncs secrets from external providers
# (AWS Secrets Manager, HashiCorp Vault, GCP Secret Manager, Azure Key Vault)
# into Kubernetes Secrets automatically.
#
# Prerequisites:
# 1. Install External Secrets Operator:
#    helm repo add external-secrets https://charts.external-secrets.io
#    helm install external-secrets external-secrets/external-secrets \
#      -n external-secrets --create-namespace
#
# 2. Configure your cloud provider credentials/IAM role
#
# 3. Create the secrets in AWS Secrets Manager (or your chosen provider):
#    aws secretsmanager create-secret --name microservices/database \
#      --secret-string '{"username":"myuser","password":"mysecretpassword","database":"medical_appointments"}'
#    aws secretsmanager create-secret --name microservices/redis \
#      --secret-string '{"password":"redispassword"}'
#    aws secretsmanager create-secret --name microservices/jwt \
#      --secret-string '{"secret_key":"your-jwt-secret-key"}'
#
# 4. Apply this file:
#    kubectl apply -f external-secrets.yml

---
# SecretStore defines the connection to the external secrets provider
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: microservices-cicd-platform
  labels:
    app.kubernetes.io/part-of: microservices-cicd-platform
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa

---
# Database credentials from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: database-credentials
  namespace: microservices-cicd-platform
  labels:
    app.kubernetes.io/part-of: microservices-cicd-platform
    secret-type: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: database-credentials
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: microservices/database
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: microservices/database
        property: password
    - secretKey: POSTGRES_DB
      remoteRef:
        key: microservices/database
        property: database

---
# Redis credentials from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-credentials
  namespace: microservices-cicd-platform
  labels:
    app.kubernetes.io/part-of: microservices-cicd-platform
    secret-type: cache
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: microservices/redis
        property: password

---
# JWT secret from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jwt-secret
  namespace: microservices-cicd-platform
  labels:
    app.kubernetes.io/part-of: microservices-cicd-platform
    secret-type: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: jwt-secret
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: microservices/jwt
        property: secret_key
