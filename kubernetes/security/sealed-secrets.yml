# US-42: Sealed Secrets for secure credential management
#
# Sealed Secrets encrypts secrets client-side so they are safe to store in Git.
# Only the Sealed Secrets controller in the cluster can decrypt them.
#
# Prerequisites:
# 1. Install Sealed Secrets controller:
#    kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.24.0/controller.yaml
#
# 2. Install kubeseal CLI:
#    brew install kubeseal  (macOS)
#    # or download from https://github.com/bitnami-labs/sealed-secrets/releases
#
# How to create a SealedSecret:
# 1. Create a regular Kubernetes Secret (do NOT commit this file):
#    kubectl create secret generic database-credentials \
#      --namespace=microservices-cicd-platform \
#      --from-literal=POSTGRES_USER=myuser \
#      --from-literal=POSTGRES_PASSWORD=mysecretpassword \
#      --from-literal=POSTGRES_DB=medical_appointments \
#      --dry-run=client -o yaml > /tmp/db-secret.yaml
#
# 2. Seal it (safe to commit):
#    kubeseal --format yaml < /tmp/db-secret.yaml > kubernetes/security/sealed-secrets.yml
#
# 3. Clean up the plaintext secret:
#    rm /tmp/db-secret.yaml
#
# IMPORTANT: The encrypted values below are PLACEHOLDERS.
# You must regenerate them with kubeseal using your cluster's public key.

---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: database-credentials
  namespace: microservices-cicd-platform
  labels:
    app.kubernetes.io/part-of: microservices-cicd-platform
    secret-type: database
spec:
  encryptedData:
    # Replace these placeholders with real sealed values generated by kubeseal:
    # echo -n 'value' | kubeseal --raw --namespace microservices-cicd-platform --name database-credentials
    POSTGRES_USER: AgA...placeholder-replace-with-kubeseal-output
    POSTGRES_PASSWORD: AgA...placeholder-replace-with-kubeseal-output
    POSTGRES_DB: AgA...placeholder-replace-with-kubeseal-output
  template:
    metadata:
      name: database-credentials
      namespace: microservices-cicd-platform
      labels:
        app.kubernetes.io/part-of: microservices-cicd-platform
    type: Opaque

---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: redis-credentials
  namespace: microservices-cicd-platform
  labels:
    app.kubernetes.io/part-of: microservices-cicd-platform
    secret-type: cache
spec:
  encryptedData:
    # echo -n 'value' | kubeseal --raw --namespace microservices-cicd-platform --name redis-credentials
    REDIS_PASSWORD: AgA...placeholder-replace-with-kubeseal-output
  template:
    metadata:
      name: redis-credentials
      namespace: microservices-cicd-platform
      labels:
        app.kubernetes.io/part-of: microservices-cicd-platform
    type: Opaque

---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: jwt-secret
  namespace: microservices-cicd-platform
  labels:
    app.kubernetes.io/part-of: microservices-cicd-platform
    secret-type: auth
spec:
  encryptedData:
    # echo -n 'value' | kubeseal --raw --namespace microservices-cicd-platform --name jwt-secret
    JWT_SECRET_KEY: AgA...placeholder-replace-with-kubeseal-output
  template:
    metadata:
      name: jwt-secret
      namespace: microservices-cicd-platform
      labels:
        app.kubernetes.io/part-of: microservices-cicd-platform
    type: Opaque
