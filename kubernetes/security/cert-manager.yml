# US-39: cert-manager ClusterIssuers for Let's Encrypt TLS
#
# Prerequisites:
# 1. Install cert-manager CRDs and controller:
#    kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.13.0/cert-manager.yaml
#
# 2. Wait for cert-manager pods to be ready:
#    kubectl wait --for=condition=Ready pods -l app.kubernetes.io/instance=cert-manager -n cert-manager --timeout=120s
#
# 3. Apply this file:
#    kubectl apply -f cert-manager.yml
#
# Usage:
# - Use letsencrypt-staging for testing (no rate limits)
# - Switch to letsencrypt-prod for production (strict rate limits)

---
# Staging issuer - use this for testing to avoid Let's Encrypt rate limits
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: dabid.banegas@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
# Production issuer - use this for real TLS certificates
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: dabid.banegas@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
