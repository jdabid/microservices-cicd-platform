apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-api
  namespace: microservices-cicd-platform
  labels:
    app: backend-api
    app.kubernetes.io/name: backend-api
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-worker
  namespace: microservices-cicd-platform
  labels:
    app: backend-worker
    app.kubernetes.io/name: backend-worker
    app.kubernetes.io/component: worker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-role
  namespace: microservices-cicd-platform
  labels:
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-api-role-binding
  namespace: microservices-cicd-platform
  labels:
    app.kubernetes.io/component: rbac
subjects:
  - kind: ServiceAccount
    name: backend-api
    namespace: microservices-cicd-platform
roleRef:
  kind: Role
  name: backend-role
  apiGroup: rbac.authorization.k8s.io
