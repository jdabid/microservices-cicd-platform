apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s

    rule_files:
      - /etc/prometheus/alert_rules.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'backend-api'
        metrics_path: /metrics
        static_configs:
          - targets: ['backend-api.microservices-cicd-platform.svc.cluster.local:8000']

      - job_name: 'node-exporter'
        static_configs:
          - targets: ['node-exporter:9100']

      - job_name: 'postgres-exporter'
        static_configs:
          - targets: ['postgres-exporter:9187']

      - job_name: 'redis-exporter'
        static_configs:
          - targets: ['redis-exporter:9121']

  alert_rules.yml: |
    groups:
      - name: backend-api
        rules:
          - alert: HighErrorRate
            expr: |
              100 * sum(rate(http_requests_total{job="backend-api", status_code=~"5.."}[5m]))
              / sum(rate(http_requests_total{job="backend-api"}[5m])) > 5
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on backend-api"
              description: "Error rate is {{ $value }}% (threshold: 5%)"

          - alert: HighLatency
            expr: |
              histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="backend-api"}[5m])) by (le)) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High latency on backend-api"
              description: "P95 latency is {{ $value }}s (threshold: 1s)"

      - name: infrastructure
        rules:
          - alert: HighCPUUsage
            expr: 100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage on {{ $labels.instance }}"
              description: "CPU usage is {{ $value }}%"

          - alert: HighMemoryUsage
            expr: |
              100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on {{ $labels.instance }}"
              description: "Memory usage is {{ $value }}%"

          - alert: HighDiskUsage
            expr: |
              100 - ((node_filesystem_avail_bytes{mountpoint="/", fstype!="tmpfs"}
              / node_filesystem_size_bytes{mountpoint="/", fstype!="tmpfs"}) * 100) > 85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High disk usage on {{ $labels.instance }}"
              description: "Disk usage is {{ $value }}%"

          - alert: PostgreSQLDown
            expr: pg_up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL is down"
              description: "PostgreSQL exporter reports the database is unreachable"

          - alert: RedisDown
            expr: redis_up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Redis is down"
              description: "Redis exporter reports the instance is unreachable"
