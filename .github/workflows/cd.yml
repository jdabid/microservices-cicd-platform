name: CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/jdabid/backend-api
  WORKER_IMAGE: ghcr.io/jdabid/backend-worker
  FRONTEND_IMAGE: ghcr.io/jdabid/frontend
  HELM_CHART: helm/microservices-platform
  NAMESPACE: microservices-cicd-platform
  KIND_VERSION: v0.20.0
  KUBECTL_VERSION: v1.28.0

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend-api
        uses: docker/build-push-action@v5
        with:
          context: backend-api
          file: backend-api/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend-worker
        uses: docker/build-push-action@v5
        with:
          context: backend-api
          file: backend-api/Dockerfile.worker
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}
            ${{ env.WORKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging (Kind)
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Create kind cluster
        run: |
          kind create cluster \
            --name staging-cluster \
            --config scripts/kind-cluster-config.yaml \
            --wait 60s
          kubectl cluster-info --context kind-staging-cluster
          kubectl get nodes

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Build Docker images locally
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -f backend-api/Dockerfile backend-api/
          docker build -t ${{ env.WORKER_IMAGE }}:${{ github.sha }} \
            -f backend-api/Dockerfile.worker backend-api/
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -f frontend/Dockerfile frontend/

      - name: Load images into kind cluster
        run: |
          kind load docker-image \
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --name staging-cluster
          kind load docker-image \
            ${{ env.WORKER_IMAGE }}:${{ github.sha }} \
            --name staging-cluster
          kind load docker-image \
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --name staging-cluster

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          helm upgrade --install microservices-platform ${{ env.HELM_CHART }} \
            -n ${{ env.NAMESPACE }} \
            -f ${{ env.HELM_CHART }}/values-staging.yaml \
            --set backendApi.image.repository=${{ env.BACKEND_IMAGE }} \
            --set backendApi.image.tag=${{ github.sha }} \
            --set backendApi.image.pullPolicy=Never \
            --set backendWorker.image.repository=${{ env.WORKER_IMAGE }} \
            --set backendWorker.image.tag=${{ github.sha }} \
            --set backendWorker.image.pullPolicy=Never \
            --set frontend.image.repository=${{ env.FRONTEND_IMAGE }} \
            --set frontend.image.tag=${{ github.sha }} \
            --set frontend.image.pullPolicy=Never \
            --set ingress.enabled=false \
            --set backendApi.autoscaling.enabled=false \
            --set networkPolicy.enabled=false \
            --wait \
            --timeout 180s

      - name: Wait for deployments
        run: |
          echo "Waiting for all deployments to be ready..."
          kubectl rollout status deployment/backend-api -n ${{ env.NAMESPACE }} --timeout=120s || true
          kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }} --timeout=120s || true
          echo ""
          echo "All pods:"
          kubectl get pods -n ${{ env.NAMESPACE }}
          echo ""
          echo "All services:"
          kubectl get svc -n ${{ env.NAMESPACE }}

      - name: Run smoke tests
        id: smoke-tests
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh ${{ env.NAMESPACE }} 120

      - name: Rollback on failure
        if: failure() && steps.smoke-tests.outcome == 'failure'
        run: |
          echo "Smoke tests failed - initiating rollback..."
          chmod +x scripts/rollback.sh
          ./scripts/rollback.sh microservices-platform ${{ env.NAMESPACE }} || true

      - name: Collect debug info on failure
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide || true
          echo ""
          echo "=== Pod Descriptions ==="
          kubectl describe pods -n ${{ env.NAMESPACE }} || true
          echo ""
          echo "=== Events ==="
          kubectl get events -n ${{ env.NAMESPACE }} --sort-by='.lastTimestamp' || true
          echo ""
          echo "=== Helm Status ==="
          helm status microservices-platform -n ${{ env.NAMESPACE }} || true
          echo ""
          echo "=== Backend API Logs ==="
          kubectl logs -n ${{ env.NAMESPACE }} -l app=backend-api --tail=50 || true

      - name: Cleanup kind cluster
        if: always()
        run: |
          kind delete cluster --name staging-cluster

  deploy-production:
    name: Deploy to Production (Kind)
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Create kind cluster
        run: |
          kind create cluster \
            --name production-cluster \
            --config scripts/kind-cluster-config.yaml \
            --wait 60s
          kubectl cluster-info --context kind-production-cluster
          kubectl get nodes

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Build Docker images locally
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -f backend-api/Dockerfile backend-api/
          docker build -t ${{ env.WORKER_IMAGE }}:${{ github.sha }} \
            -f backend-api/Dockerfile.worker backend-api/
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -f frontend/Dockerfile frontend/

      - name: Load images into kind cluster
        run: |
          kind load docker-image \
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --name production-cluster
          kind load docker-image \
            ${{ env.WORKER_IMAGE }}:${{ github.sha }} \
            --name production-cluster
          kind load docker-image \
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --name production-cluster

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          helm upgrade --install microservices-platform ${{ env.HELM_CHART }} \
            -n ${{ env.NAMESPACE }} \
            -f ${{ env.HELM_CHART }}/values-prod.yaml \
            --set backendApi.image.repository=${{ env.BACKEND_IMAGE }} \
            --set backendApi.image.tag=${{ github.sha }} \
            --set backendApi.image.pullPolicy=Never \
            --set backendWorker.image.repository=${{ env.WORKER_IMAGE }} \
            --set backendWorker.image.tag=${{ github.sha }} \
            --set backendWorker.image.pullPolicy=Never \
            --set frontend.image.repository=${{ env.FRONTEND_IMAGE }} \
            --set frontend.image.tag=${{ github.sha }} \
            --set frontend.image.pullPolicy=Never \
            --set ingress.enabled=false \
            --set backendApi.autoscaling.enabled=false \
            --set networkPolicy.enabled=false \
            --wait \
            --timeout 180s

      - name: Wait for deployments
        run: |
          echo "Waiting for all deployments to be ready..."
          kubectl rollout status deployment/backend-api -n ${{ env.NAMESPACE }} --timeout=120s || true
          kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }} --timeout=120s || true
          echo ""
          echo "All pods:"
          kubectl get pods -n ${{ env.NAMESPACE }}
          echo ""
          echo "All services:"
          kubectl get svc -n ${{ env.NAMESPACE }}

      - name: Run smoke tests
        id: smoke-tests
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh ${{ env.NAMESPACE }} 120

      - name: Rollback on failure
        if: failure() && steps.smoke-tests.outcome == 'failure'
        run: |
          echo "Smoke tests failed - initiating rollback..."
          chmod +x scripts/rollback.sh
          ./scripts/rollback.sh microservices-platform ${{ env.NAMESPACE }} || true

      - name: Collect debug info on failure
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide || true
          echo ""
          echo "=== Pod Descriptions ==="
          kubectl describe pods -n ${{ env.NAMESPACE }} || true
          echo ""
          echo "=== Events ==="
          kubectl get events -n ${{ env.NAMESPACE }} --sort-by='.lastTimestamp' || true
          echo ""
          echo "=== Helm Status ==="
          helm status microservices-platform -n ${{ env.NAMESPACE }} || true

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Deployment Info
            - **Image Tag**: `${{ github.sha }}`
            - **Helm Chart**: `microservices-platform v0.1.0`
            - **Environment**: Production
            - **Smoke Tests**: Passed

      - name: Cleanup kind cluster
        if: always()
        run: |
          kind delete cluster --name production-cluster
