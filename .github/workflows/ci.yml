name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend-api/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir -r requirements-dev.txt

      - name: Run ruff check
        run: ruff check app/

      - name: Run mypy
        run: mypy app/ --ignore-missing-imports

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend-api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend-api/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-report=html --cov-fail-under=80 -v

      - name: Pytest coverage comment
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: backend-api/coverage.xml
          junitxml-path: backend-api/junit.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend-api/htmlcov/
          retention-days: 14

  security:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend-api/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir bandit[toml]

      - name: Run bandit security scan
        run: bandit -r app/ -c pyproject.toml -ll -f json -o bandit-report.json || true

      - name: Check for HIGH severity issues
        run: |
          bandit -r app/ -c pyproject.toml -lll
          echo "No HIGH severity issues found."

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: backend-api/bandit-report.json
          retention-days: 14

  container-scan:
    name: Container Security Scan (Trivy)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image-name: backend-api
            dockerfile: backend-api/Dockerfile
            context: backend-api
          - image-name: backend-worker
            dockerfile: backend-api/Dockerfile.worker
            context: backend-api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.image-name }}:${{ github.sha }} \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.context }}

      - name: Run Trivy vulnerability scanner (table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image-name }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          output: trivy-${{ matrix.image-name }}-table.txt

      - name: Run Trivy vulnerability scanner (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image-name }}:${{ github.sha }}
          format: sarif
          exit-code: "0"
          severity: HIGH,CRITICAL
          output: trivy-${{ matrix.image-name }}.sarif

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image-name }}.sarif
          category: trivy-${{ matrix.image-name }}

      - name: Upload Trivy scan results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.image-name }}
          path: |
            trivy-${{ matrix.image-name }}-table.txt
            trivy-${{ matrix.image-name }}.sarif
          retention-days: 14
